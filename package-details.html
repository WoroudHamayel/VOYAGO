<!doctype html>
<html lang="en">
  <head>

    <link rel="stylesheet" href="./assets/css/output.css" />

  <body class="bg-[#0A0F1A]">
    <header>
      <div class="container mx-auto flex justify-between items-center">
        <div class="logo">
          <a href="./index.html">
            <img
              src="./assets/image/Package Details/VOYAGO.svg"
              class="w-[115px] h-[32px] sm:ml-[64px]"
            />
          </a>
        </div>
        <div class="list hidden md:block">
          <ul
            class="flex gap-[48px] text-[#FFFFFF] font-abhaya-libra text-[13px] tracking-[2px]"
          >
            <li
              class="hover:text-[#C5A059] hover:underline underline-offset-4 transition tracking-[2px]"
            >
              <a href="#">DESTINATIONS</a>
            </li>
            <li
              class="hover:text-[#C5A059] hover:underline underline-offset-4 transition tracking-[2px]"
            >
              <a href="#">EXPERIENCES</a>
            </li>
            <li
              class="hover:text-[#C5A059] hover:underline underline-offset-4 transition tracking-[2px]"
            >
              <a href="#">JOURNALS</a>
            </li>
            <li
              class="hover:text-[#C5A059] hover:underline underline-offset-4 transition tracking-[2px]"
            >
              <a href="#">ABOUT</a>
            </li>
          </ul>
        </div>
        <div class="icons">
          <ul class="flex">
            <li>
              <a href="#">
                <img
                  class="my-[30.9px]"
                  src="./assets/image/Package Details/search.svg"
                />
              </a>
            </li>
            <li>
              <a href="#">
                <img
                  class="my-[30px]"
                  src="./assets/image/Package Details/margin.svg"
                />
              </a>
            </li>
            <li>
              <a href="#">
                <button
                  class="bg-[#C5A059] px-[32px] py-[12px] text-[#0A0F1A] mx-[32px] my-[21px] font-manrope font-semibold text-[13px] tracking-[2px]"
                >
                  RESERVE NOW
                </button>
              </a>
            </li>
          </ul>
        </div>
      </div>
    </header>
    <section class="bg-[#191F2F] py-[48px]">
      <div class="container mx-auto flex gap-[16px]">
        <div>
          <div class="relative w-[762.66px] h-[762.69px] overflow-hidden">
            <img
              src="./assets/image/Package Details/Luxury safari lodge.svg"
              class="h-full w-full object-cover"
            />
            <div class="absolute inset-0 bg-black/20"></div>
            <div class="absolute bottom-10 left-10 text-white">
              <h1
                class="font-noto-serif text-[16px] leading-none text-[#E4C285]"
              >
                Botswana / Okavango Delta
              </h1>
              <p class="font-noto-serif mt-[16px] text-[#DCE2F7] text-[16px]">
                The Celestial Horizon Expedition
              </p>
              <div class="flex gap-[32px] mt-[16px]">
                <div class="flex gap-[8px]">
                  <img
                    src="./assets/image/Package Details/Clock.svg"
                    class="w-[14.25px] h-[14.25px]"
                  />
                  <p class="font-manrope text-[#C6C6CC] text-[16px]">12 DAYS</p>
                </div>
                <div class="flex gap-[8px]">
                  <img
                    src="./assets/image/Package Details/Profile Icon.svg"
                    class="w-[14.25px] h-[14.25px]"
                  />
                  <p class="font-manrope text-[#C6C6CC] text-[16px]">
                    MAX 6 GUESTS
                  </p>
                </div>
                <div class="flex gap-[8px]">
                  <img
                    src="./assets/image/Package Details/Airplane Landing Icon.svg"
                    class="w-[14.25px] h-[14.25px]"
                  />
                  <p class="font-manrope text-[#C6C6CC] text-[16px]">
                    PRIVATE JET TRANSFERS
                  </p>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div>
          <img
            src="./assets/image/Package Details/Luxury car on savannah.svg"
            class="mb-[16px]"
          />
          <img src="./assets/image/Package Details/Safari dinner table.svg" />
        </div>
      </div>
    </section>

</html>
